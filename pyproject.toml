[tool.ruff]
line-length = 130

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "W",      # pycodestyle warnings
    "B",      # flake8-bugbear
    "S",      # flake8-bandit (security)
    "SIM",    # flake8-simplify
    "C90",    # mccabe complexity
    "UP",     # pyupgrade
    "PIE",    # flake8-pie
    "RET",    # flake8-return
    "PERF",   # perflint
    "I",      # isort (import sorting)
    "RUF",    # Ruff-specific rules
    "PLC",    # pylint convention
    "PLE",    # pylint error
    "PLW",    # pylint warning
    "PLR",    # pylint refactor
    "FURB",   # refurb — modernization
    "C4",     # flake8-comprehensions
    "FLY",    # flynt — static join to f-string
    "ISC",    # flake8-implicit-str-concat
    "FA",     # flake8-future-annotations
    "SLOT",   # flake8-slots
    "LOG",    # flake8-logging
    "RSE",    # flake8-raise
    "TID",    # flake8-tidy-imports
    "G",      # flake8-logging-format
    "YTT",    # flake8-2020 (sys.version checks)
    "PGH",    # pygrep-hooks
    "INT",    # flake8-gettext
    "EXE",    # flake8-executable
    "T10",    # flake8-debugger
    "A",      # flake8-builtins (no shadowing builtins)
    "PT",     # flake8-pytest-style
    "DTZ",    # flake8-datetimez
    "TC",     # flake8-type-checking
    "ASYNC",  # flake8-async
    "SLF",    # flake8-self (no private member access)
    "N",      # pep8-naming
    "ARG",    # flake8-unused-arguments
    "FBT",    # flake8-boolean-trap
    "FIX",    # flake8-fixme (no TODO/FIXME/HACK markers)
    "ERA",    # eradicate (no commented-out code)
    "ICN",    # flake8-import-conventions
    "BLE",    # flake8-blind-except (no bare Exception catches)
    "PTH",    # flake8-use-pathlib (prefer pathlib over os.path)
]
ignore = [
    "S603",   # subprocess-without-shell-check (false positives)
    "S604",   # call-with-shell-equals-true (operational scripts)
    "S605",   # start-process-with-a-shell (operational scripts)
    "S607",   # start-process-with-partial-path
    "S108",   # hardcoded-temp-file
    "S110",   # try-except-pass (already using contextlib.suppress)
    "S101",   # assert (used in tests)
    "S301",   # suspicious-pickle-usage
    "S113",   # request-without-timeout (already fixed)
    "S311",   # suspicious-non-cryptographic-random-usage (IDs, not crypto)
    "S608",   # possible-sql-injection (config constants, not user input)
    "S507",   # paramiko-auto-add-policy (controlled environment, single VPS)
    "E402",   # module-import-not-at-top (required for sys.path setup)
    "PLR2004", # magic-value-comparison (HTTP status codes etc. are clear in context)
    "PLR0915", # too-many-statements (operational deploy scripts have long main())
    "PLC0415", # import-outside-top-level (conditional imports in operational scripts)
]

[tool.ruff.lint.per-file-ignores]
"scripts/test/*.py" = ["S106", "ARG001", "ARG002", "ARG005", "PT019"]  # test passwords, unused mock/lambda args from @patch, pytest fixture style
"scripts/test/test_gen_id.py" = ["E402"]  # imports after mock setup (intentional)
"scripts/test/test_deploy_ct4.py" = ["PTH118"]  # os.path.join in assertions matching production code
"scripts/test/test_ai_agent.py" = ["BLE001"]  # operational test, broad catch is intentional
"scripts/test/test_e2e_workflows.py" = ["BLE001"]  # operational test
"scripts/test/test_each_workflow.py" = ["BLE001"]  # operational test
"scripts/test/test_telegram_direct.py" = ["BLE001"]  # operational test
"scripts/test/verify_execution.py" = ["BLE001"]  # operational test
# Operational scripts (run against live servers) — grandfathered PTH/BLE violations
"scripts/fix/*.py" = ["BLE001", "PTH"]  # operational fix scripts
"scripts/diagnostics/*.py" = ["BLE001"]  # diagnostic scripts
"scripts/debug_*.py" = ["BLE001"]  # debug scripts
"scripts/get_*.py" = ["BLE001", "PTH123"]  # getter scripts
"scripts/fetch_*.py" = ["PTH123"]  # fetch scripts
"scripts/upload_*.py" = ["PTH123"]  # upload scripts
"scripts/rebuild_*.py" = ["BLE001", "PTH123"]  # rebuild scripts
"scripts/mejoras_*.py" = ["BLE001", "PTH"]  # mejoras scripts
"scripts/execute_daily_briefing.py" = ["BLE001"]  # operational
"scripts/patch_workflow.py" = ["BLE001"]  # operational
"scripts/import_workflows_hetzner.py" = ["PTH"]  # os.path used with test mocks
"scripts/upgrade_agent_node.py" = ["PTH123"]  # operational
"scripts/deploy/deploy_ct4.py" = ["PTH"]  # os.path used with test mocks
"scripts/deploy/fase2_deploy.py" = ["PTH123"]  # open() in deploy context
"scripts/deploy/fase3_ssl_dashboard.py" = ["PTH123"]  # operational

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.pytest.ini_options]
testpaths = ["scripts/test"]
python_files = ["test_*.py"]

[tool.coverage.run]
source = ["scripts"]
omit = [
    # Operational scripts that run against live servers (SSH/HTTP)
    "scripts/debug_*.py",
    "scripts/dump_*.py",
    "scripts/download_*.py",
    "scripts/fetch_*.py",
    "scripts/find_*.py",
    "scripts/get_*.py",
    "scripts/grep_*.py",
    "scripts/kill_*.py",
    "scripts/isolate_*.py",
    "scripts/mejoras_*.py",
    "scripts/patch_sqlite_cred.py",
    "scripts/query_*.py",
    "scripts/read_*.py",
    "scripts/rebuild_*.py",
    "scripts/reset_pw_v3.py",
    "scripts/restart_*.py",
    "scripts/setup_*.py",
    "scripts/start_*.py",
    "scripts/trigger_*.py",
    "scripts/upload_*.py",
    # Integration test scripts (run against live server, not pytest)
    # Deploy scripts that run against live server with no extracted helpers
    "scripts/deploy/deploy_chat_widget.py",
    "scripts/deploy/fase3_ssl_dashboard.py",
    # Diagnostics scripts (run against live server, except check_server which has tests)
    "scripts/diagnostics/check_docker_compose.py",
    "scripts/diagnostics/check_exec_error.py",
    "scripts/diagnostics/check_n8n_*.py",
    "scripts/diagnostics/check_openrouter_balance.py",
    "scripts/diagnostics/check_port*.py",
    "scripts/diagnostics/check_ssl_prereqs.py",
    "scripts/diagnostics/check_webhook_paths.py",
    "scripts/diagnostics/diag_*.py",
    "scripts/diagnostics/inspect_docker.py",
    # Fix scripts (run against live server, not unit-testable)
    "scripts/fix/*.py",
    "scripts/test/test_after_*.py",
    "scripts/test/test_ai_agent.py",
    "scripts/test/test_e2e_*.py",
    "scripts/test/test_each_*.py",
    "scripts/test/test_explicit_*.py",
    "scripts/test/test_nginx_*.py",
    "scripts/test/test_openrouter_*.py",
    "scripts/test/test_telegram_*.py",
    "scripts/test/test_webhook_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "if __name__",
    "pragma: no cover",
]
